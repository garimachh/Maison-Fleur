<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Quote | Maison Fleur</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f5f3ee;
      color: #4a4a4a;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }

    .navbar {
      background-color: #6e735f;
    }

    .navbar a {
      color: #fff !important;
    }

    .form-section {
      padding: 80px 20px;
      max-width: 700px;
      margin: auto;
    }

    .form-control, .form-select {
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 12px;
    }

    .btn-custom {
      border: 1px solid #6e735f;
      color: #6e735f;
      border-radius: 30px;
      padding: 10px 25px;
      background: transparent;
    }

    .btn-custom:hover {
      background: #6e735f;
      color: #fff;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand text-white" href="index.html">Maison Fleur</a>
  </div>
</nav>

<!-- FORM -->
<section class="form-section text-center">
  <h1 class="mb-3">Get a Quote</h1>
  <p class="mb-5">Tell us about your vision — we’d love to bring it to life.</p>

  <form class="text-start">

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" placeholder="Your name">
    </div>

    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-control" placeholder="Your email">
    </div>

    <div class="mb-3">
      <label class="form-label">Event Type</label>
      <select class="form-select">
        <option>Wedding</option>
        <option>Birthday</option>
        <option>Corporate Event</option>
        <option>Custom Installation</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Event Date</label>
      <input type="date" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Budget Range</label>
      <select class="form-select">
        <option>₹10,000 - ₹25,000</option>
        <option>₹25,000 - ₹50,000</option>
        <option>₹50,000+</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label">Tell us about your vision</label>
      <textarea class="form-control" rows="4" placeholder="Describe your idea..."></textarea>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-custom">Submit Request →</button>
    </div>

  </form>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
